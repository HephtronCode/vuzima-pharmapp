services:
  db:
    image: postgres:16-alpine
    container_name: vuzima_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  cache:
    image: redis:7-alpine
    container_name: vuzima_cache
    ports:
      - "${REDIS_PORT:-6379}:6379"

  api:
    image: node:20-alpine
    container_name: vuzima_api
    working_dir: /app
    command: sh -c "corepack enable && pnpm install && pnpm --filter @vuzima/api dev"
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      API_PORT: ${API_PORT:-3000}
      CLIENT_ORIGIN: ${CLIENT_ORIGIN:-http://localhost:5173}
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL:-redis://cache:6379}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-1d}
    volumes:
      - ./:/app
    ports:
      - "${API_PORT:-3000}:3000"
    depends_on:
      - db
      - cache

  client:
    image: node:20-alpine
    container_name: vuzima_client
    working_dir: /app
    command: sh -c "corepack enable && pnpm install && pnpm --filter @vuzima/client dev -- --host 0.0.0.0"
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:3000}
    volumes:
      - ./:/app
    ports:
      - "${CLIENT_PORT:-5173}:5173"
    depends_on:
      - api

  worker:
    image: node:20-alpine
    container_name: vuzima_worker
    working_dir: /app
    command: sh -c "corepack enable && pnpm install && pnpm --filter @vuzima/worker dev"
    volumes:
      - ./:/app
    depends_on:
      - cache

volumes:
  pgdata:
